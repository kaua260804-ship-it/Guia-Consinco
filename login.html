<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Guia Consinco</title>
    
    <!-- Configuração para GitHub Pages -->
    <script>
        const BASE_PATH = '/Guia-Consinco';
    </script>
    
    <link rel="stylesheet" href="assets/css/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div style="text-align: center; margin-bottom: 20px;">
                <i class="fas fa-book" style="font-size: 3em; color: #3498db;"></i>
            </div>
            <h1>Guia Consinco</h1>
            <h2>Sistema de Guias ERP</h2>
            
            <form id="login-form">
                <div class="form-group">
                    <label for="username">
                        <i class="fas fa-user"></i> Usuário
                    </label>
                    <input type="text" id="username" name="username" required 
                           placeholder="Digite seu usuário" autocomplete="username">
                </div>
                
                <div class="form-group">
                    <label for="password">
                        <i class="fas fa-lock"></i> Senha
                    </label>
                    <input type="password" id="password" name="password" required 
                           placeholder="Digite sua senha" autocomplete="current-password">
                </div>
                
                <button type="submit" class="btn-login">
                    <i class="fas fa-sign-in-alt"></i> Entrar
                </button>
                
                <div id="login-error" class="error-message"></div>
            </form>
            
            <div class="login-info">
                <p><strong><i class="fas fa-key"></i> Credenciais de acesso:</strong></p>
                <div style="background: #f8f9fa; padding: 10px; border-radius: 5px; margin-top: 10px;">
                    <p style="margin: 5px 0;">
                        <i class="fas fa-eye"></i> 
                        <strong>Visualizador:</strong><br>
                        <code>user</code> / <code>123456</code>
                    </p>
                    <p style="margin: 5px 0; margin-top: 10px;">
                        <i class="fas fa-user-shield"></i> 
                        <strong>Administrador:</strong><br>
                        <code>admin</code> / <code>admin123</code>
                    </p>
                </div>
                <p style="margin-top: 15px; font-size: 0.9em; color: #666;">
                    <i class="fas fa-info-circle"></i> 
                    O visualizador pode apenas ver o conteúdo.<br>
                    O administrador pode criar, editar e excluir.
                </p>
            </div>
        </div>
    </div>
    
    <script src="assets/js/auth.js"></script>
</body>
</html>
