<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guia Consinco - Sistema de Anotações</title>
    
    <!-- Configuração para GitHub Pages -->
    <script>
        const BASE_PATH = '/Guia-Consinco';
    </script>
    
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Biblioteca para PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <div id="sidebar-container"></div>
        
        <!-- Main Content -->
        <div class="main-content">
            <!-- Header -->
            <div id="header-container"></div>
            
            <!-- Content Area -->
            <div class="content-wrapper" id="content-wrapper">
                <div class="welcome-screen">
                    <i class="fas fa-book-open"></i>
                    <h2>Bem-vindo ao Guia Consinco</h2>
                    <p>Carregando...</p>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Modal para Editor -->
    <div id="editor-modal" class="modal">
        <div class="modal-content modal-large">
            <div class="modal-header">
                <h2 id="modal-title">Editor de Anotações</h2>
                <span class="modal-close" onclick="if(window.ui) ui.closeModal()">&times;</span>
            </div>
            <div class="modal-body">
                <div id="editor-container"></div>
            </div>
        </div>
    </div>
    
    <!-- Modal para Comentários -->
    <div id="comentarios-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="comentarios-modal-title">Comentários</h2>
                <span class="modal-close" onclick="if(window.ui) ui.closeComentariosModal()">&times;</span>
            </div>
            <div class="modal-body">
                <div id="comentarios-container"></div>
            </div>
        </div>
    </div>
    
    <!-- Scripts na ordem correta -->
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/modules/database.js"></script>
    <script src="assets/js/modules/ui.js"></script>
    <script src="assets/js/modules/editor.js"></script>
    <script src="assets/js/app.js"></script>
</body>
</html>
